services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-wm2026}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in Portainer or .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER:-postgres}", "-d", "${DB_NAME:-wm2026}"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/schmeckm/wm2026_prediction-backend:latest}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    environment:
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in Portainer or .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      REFRESH_TOKEN_TTL_MS: ${REFRESH_TOKEN_TTL_MS:-2592000000}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      DISPLAY_ALLOWED_IPS: ${DISPLAY_ALLOWED_IPS:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      TRUST_PROXY: ${TRUST_PROXY:-true}
      DB_DIALECT: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-wm2026}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in Portainer or .env}
      OPEN_REGISTRATION: ${OPEN_REGISTRATION:-true}
      FOOTBALL_API_PROVIDER: ${FOOTBALL_API_PROVIDER:-football-data}
      FOOTBALL_API_BASE_URL: ${FOOTBALL_API_BASE_URL:-https://api.football-data.org/v4}
      FOOTBALL_API_KEY: ${FOOTBALL_API_KEY:-}
      FOOTBALL_API_COMPETITION_ID: ${FOOTBALL_API_COMPETITION_ID:-WC}
      FOOTBALL_API_COMPETITION_NUMERIC_ID: ${FOOTBALL_API_COMPETITION_NUMERIC_ID:-2000}
      FOOTBALL_API_SEASON: ${FOOTBALL_API_SEASON:-2026}
      FOOTBALL_API_TIMEZONE: ${FOOTBALL_API_TIMEZONE:-Europe/Zurich}
      FOOTBALL_API_SYNC_ENABLED: ${FOOTBALL_API_SYNC_ENABLED:-true}
      FOOTBALL_API_RESULT_SYNC_ENABLED: ${FOOTBALL_API_RESULT_SYNC_ENABLED:-true}
      ODDS_API_KEY: ${ODDS_API_KEY:-}
      ODDS_API_BASE_URL: ${ODDS_API_BASE_URL:-}
      ODDS_API_SPORT_KEY: ${ODDS_API_SPORT_KEY:-soccer_fifa_world_cup}
      ODDS_API_REGIONS: ${ODDS_API_REGIONS:-eu}
      ODDS_API_MARKETS: ${ODDS_API_MARKETS:-h2h}
      ODDS_API_ODDS_FORMAT: ${ODDS_API_ODDS_FORMAT:-decimal}
      ODDS_API_ENABLED: ${ODDS_API_ENABLED:-true}
      ODDS_API_CRON: ${ODDS_API_CRON:-0 6 * * *}
      ODDS_API_ROLLING_CRON: ${ODDS_API_ROLLING_CRON:-0 * * * *}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      YOUTUBE_REGION_CODE: ${YOUTUBE_REGION_CODE:-CH}
      YOUTUBE_SKIP_CHANNEL_KEYWORDS: ${YOUTUBE_SKIP_CHANNEL_KEYWORDS:-fifa}
      YOUTUBE_SKIP_CHANNEL_IDS: ${YOUTUBE_SKIP_CHANNEL_IDS:-}
      AUTO_HIGHLIGHTS_ENABLED: ${AUTO_HIGHLIGHTS_ENABLED:-false}
      AUTO_HIGHLIGHTS_CRON: ${AUTO_HIGHLIGHTS_CRON:-15 */2 * * *}
      AUTO_HIGHLIGHTS_LOOKBACK_HOURS: ${AUTO_HIGHLIGHTS_LOOKBACK_HOURS:-72}
      AUTO_HIGHLIGHTS_MAX_UPDATES: ${AUTO_HIGHLIGHTS_MAX_UPDATES:-5}
      AUTO_HIGHLIGHTS_TOURNAMENT_ONLY: ${AUTO_HIGHLIGHTS_TOURNAMENT_ONLY:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      AI_FEATURES_ENABLED: ${AI_FEATURES_ENABLED:-true}
      AI_CACHE_ENABLED: ${AI_CACHE_ENABLED:-true}
      AI_MAX_TOKENS: ${AI_MAX_TOKENS:-800}
      AI_TEMPERATURE: ${AI_TEMPERATURE:-0.4}
      AI_ADMIN_FEATURES_ENABLED: ${AI_ADMIN_FEATURES_ENABLED:-true}
      AI_USER_COACH_ENABLED: ${AI_USER_COACH_ENABLED:-true}
      AI_MATCH_PREVIEW_ENABLED: ${AI_MATCH_PREVIEW_ENABLED:-true}
      AI_LEADERBOARD_COMMENTARY_ENABLED: ${AI_LEADERBOARD_COMMENTARY_ENABLED:-true}
      APP_URL: ${APP_URL:-http://localhost:8080}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-}
      SSO_ALLOWED_EMAIL_DOMAINS: ${SSO_ALLOWED_EMAIL_DOMAINS:-}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      EMAIL_REMINDERS_ENABLED: ${EMAIL_REMINDERS_ENABLED:-true}
      MORNING_DIGEST_ENABLED: ${MORNING_DIGEST_ENABLED:-true}
      REMINDER_TIMEZONE: ${REMINDER_TIMEZONE:-Europe/Zurich}
      PLAYER_IMAGE_ENABLED: ${PLAYER_IMAGE_ENABLED:-true}
      PLAYER_IMAGE_THESPORTSDB_API_KEY: ${PLAYER_IMAGE_THESPORTSDB_API_KEY:-123}
      THESPORTSDB_VENUE_ENRICHMENT_ENABLED: ${THESPORTSDB_VENUE_ENRICHMENT_ENABLED:-true}
      THESPORTSDB_LEAGUE_ID: ${THESPORTSDB_LEAGUE_ID:-4429}
      THESPORTSDB_SEASON: ${THESPORTSDB_SEASON:-2026}
      TOURNAMENT_START: ${TOURNAMENT_START:-2026-06-11}
      TOURNAMENT_END: ${TOURNAMENT_END:-2026-07-20}
      BACKUP_OFFSITE_DIR: ${BACKUP_OFFSITE_DIR:-}
      BACKUP_PG_RETENTION: ${BACKUP_PG_RETENTION:-14}
      BACKUP_UPLOADS_RETENTION: ${BACKUP_UPLOADS_RETENTION:-7}
      PLAYER_DATA_BACKUP_ENABLED: ${PLAYER_DATA_BACKUP_ENABLED:-true}
      PLAYER_DATA_BACKUP_CRON: ${PLAYER_DATA_BACKUP_CRON:-0 * * * *}
      PLAYER_DATA_BACKUP_RETENTION: ${PLAYER_DATA_BACKUP_RETENTION:-168}
      LEADERBOARD_CACHE_TTL_MS: ${LEADERBOARD_CACHE_TTL_MS:-45000}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      SENTRY_CRON_TIMEZONE: ${SENTRY_CRON_TIMEZONE:-Europe/Zurich}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_REPO: ${GITHUB_REPO:-schmeckm/WM2026_Prediction}
      GITHUB_FEEDBACK_LABELS: ${GITHUB_FEEDBACK_LABELS:-feedback}
    volumes:
      - backend-uploads:/app/uploads
      - backend-backups:/app/backups
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/schmeckm/wm2026_prediction-frontend:latest}
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
  backend-uploads:
  backend-backups:
