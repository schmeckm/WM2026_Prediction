name: Report a bug
description: Report an error or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please do not report security vulnerabilities here — see [SECURITY.md](../SECURITY.md).

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
      placeholder: Saving a prediction returns a 500 error …
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Log in as user
        2. Open matches
        3. Submit prediction
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Frontend (player)
        - Admin
        - API / Backend
        - Auth / SSO
        - Sync / Football API
        - AI features
        - Docker / Deployment
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "1.0.5"
    validations:
      required: false

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Local (dev)
        - Local Docker
        - Production (Portainer)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error message
      render: shell
      placeholder: Relevant console or server logs

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I tested the latest version on main
          required: false
        - label: I searched closed issues
          required: false
