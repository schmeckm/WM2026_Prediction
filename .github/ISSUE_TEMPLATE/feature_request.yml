name: Suggest a feature
description: Propose a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem should this solve?
      placeholder: Admins currently cannot …
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      placeholder: A new filter on the leaderboard that …
    validations:
      required: true

  - type: dropdown
    id: audience
    attributes:
      label: Audience
      options:
        - Players
        - Admin
        - Both
        - Technical / Infrastructure
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: What other approaches were considered?
    validations:
      required: false

  - type: checkboxes
    id: scope
    attributes:
      label: Scope (optional)
      options:
        - label: UI change required
        - label: API change required
        - label: Migration / DB schema
        - label: Documentation required
